<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnimeQuiz</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        
        <div class="start-screen">
            <h1>Anime Quiz!</h1>
            <br>
            <h3>SELECT THE NO. OF QUESTIONS</h3>
            <br>
            
            <button id= "Q5" > 5</button>
            <button id= "Q10" >10</button>
            <button id= "Q20" >20</button>
            <button id= "Q40" >40</button>

            <button id="start_btn">Start</button>

        </div>
        
        <div class="question-screen">
            
            <h2>GUESS THE CHARACTER</h2>
            
            <img id="char-img">
            
            <div class="options"></div>

            <button id="next_btn">Next</button>

        </div>
        
        <div class="end-screen">
            <h1>Your result is : <span id="result_score"></span> </h1>
            <button id="replay">Replay</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
